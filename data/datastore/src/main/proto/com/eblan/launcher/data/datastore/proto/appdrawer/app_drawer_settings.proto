syntax = "proto3";

import "com/eblan/launcher/data/datastore/proto/home/grid_item_settings.proto";
import "com/eblan/launcher/data/datastore/proto/appdrawer/eblan_application_info_order.proto";
import "com/eblan/launcher/data/datastore/proto/home/text_color.proto";

option java_package = "com.eblan.launcher.data.datastore.proto.appdrawer";
option java_multiple_files = true;

message AppDrawerSettingsProto {
  int32 appDrawerColumns = 1;
  int32 appDrawerRowsHeight = 2;
  GridItemSettingsProto gridItemSettingsProto = 3;
  EblanApplicationInfoOrderProto eblanApplicationInfoOrderProto = 4;
  TextColorProto backgroundColor = 5;
  int32 customBackgroundColor = 6;
  bool showKeyboard = 7;
}